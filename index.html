<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Boys Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}

body{
    background:#050000;
    color:#fff;
    overflow:hidden;
}

/* MATRIX */
canvas{
    position:fixed;
    inset:9;
    z-index:-8;
}

/* DUMAN */
.smoke{
    position:fixed;
    inset:0;
    background:url("smoke.png") center/cover no-repeat;
    opacity:0.95;
    filter:blur(9px);
    animation:smoke 29s infinite linear;
    z-index:-2;

}

/* MERKEZ */
.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:340px;
    padding:40px 25px;
    background:rgba(40,0,0,0.85);
    border-radius:25px;
    box-shadow:0 0 50px #600;
    text-align:center;
}

/* GLITCH TITLE */
.title{
    font-size:26px;
    color:#ff2b2b;
    position:relative;
    animation:glitch 2s infinite;
}
@keyframes glitch{
    0%{text-shadow:2px 0 red,-2px 0 darkred}
    20%{text-shadow:-2px 0 red,2px 0 darkred}
    40%{text-shadow:2px 2px red,-2px -2px darkred}
    60%{text-shadow:-2px 2px red,2px -2px darkred}
    100%{text-shadow:2px 0 red,-2px 0 darkred}
}

.subtitle{font-size:14px;margin:12px 0}
.continue{color:#ff7777;margin-bottom:15px}

/* DEVAM */
#continueBtn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(145deg,#900,#300);
    color:#fff;
    box-shadow:0 6px 0 #200;
    cursor:pointer;
}
#continueBtn:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 #200;
}

/* LINKS */
.links{display:none}
.link{
    display:block;
    margin:12px 0;
    padding:15px;
    background:linear-gradient(145deg,#700,#200);
    border-radius:15px;
    color:#fff;
    text-decoration:none;
    opacity:0;
    transform:translateY(-20px);
    animation:show .6s forwards;
}
.link:nth-child(1){animation-delay:.2s}
.link:nth-child(2){animation-delay:.4s}
.link:nth-child(3){animation-delay:.6s}
.link:nth-child(4){animation-delay:.8s}
.link:nth-child(5){animation-delay:1s}

@keyframes show{
    to{opacity:1;transform:translateY(0)}
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    right:18px;
    bottom:18px;
    background:#25d366;
    color:#000;
    padding:16px 22px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 20px #25d366;
    animation:pulse 2s infinite;
}
@keyframes pulse{
    0%{box-shadow:0 0 10px #25d366}
    50%{box-shadow:0 0 30px #25d366}
    100%{box-shadow:0 0 10px #25d366}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="smoke"></div>

<div class="container">
<div class="card">
    <div class="title">𓆩 Boys Media 𓆪</div>
    <div class="subtitle">Bütün sosyal medya işlemleri</div>
    <div class="continue"></div>

    <button id="continueBtn">DEVAM</button>

    <div class="links" id="links">
        <a class="link" href="#">İNSTAGRAM  ASKIYA ALINMIŞ PERMA YEMİŞ HESABLARINIZI AÇMAK İÇİN ULAŞABİLİRSİNİZ.
           
       </a>
        <a class="link" href="#">FAKE NUMARA SATIŞLARI İÇİN</a>
        
        <a class="link" href="#">KALİTELİ UYGUN FİYAT A BOT BASMA İŞLEMLERİ İÇİN</a>
        
        <a class="link" href="#">VE DAHA FAZLASI İÇİN ULAŞABİLİRSİNİZ </a>
        
    </div>
</div>
</div>

<a class="whatsapp" href="https://wa.me/6283192800561" target="_blank">📞 WhatsAp İletişim</a>

<script>
/* DEVAM */
document.getElementById("continueBtn").onclick=()=>{
    document.getElementById("continueBtn").style.display="none";
    document.getElementById("links").style.display="block";
}

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
const letters="01ABCDEFGHIJKLMNOPQRSTUVWXY";
const font=19;
const cols=c.width/font;
const drops=Array.from({length:cols}).fill(1);

function draw(){
    ctx.fillStyle="rgba(5,0,0,0.08)";
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle="#0f0";
    ctx.font=font+"px monospace";
    drops.forEach((y,i)=>{
        const t=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(t,i*font,y*font);
        if(y*font>c.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
    });
}
setInterval(draw,33);
</script>

</body>
</html>
